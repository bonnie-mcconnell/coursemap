version: "3.9"

services:
  coursemap:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8000}
      - PLAN_RATE_LIMIT=${PLAN_RATE_LIMIT:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Persist plan store across restarts
      - coursemap_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  coursemap_data:
