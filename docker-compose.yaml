# docker-compose.yaml - local dev and self-hosted deployment
# Usage:
#   docker compose up --build          # start
#   docker compose up --build -d       # start in background
#   docker compose down                # stop
#
# Env vars (create a .env file to override):
#   PORT=8080
#   ALLOWED_ORIGINS=https://yourdomain.com
#   COURSEMAP_DB_PATH=/app/data/plans.db  (default - stored in named volume)

services:
  coursemap:
    build: .
    image: coursemap:latest
    container_name: coursemap
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - WORKERS=1                           # Must be 1 with SQLite backend
      - COURSEMAP_DB_PATH=/app/data/plans.db
    volumes:
      # Mount datasets directory so you can update data without rebuilding
      - ./datasets:/app/datasets:ro
      # Named volume for SQLite plan store - persists across restarts/rebuilds
      - coursemap-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/api')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  coursemap-data:
    driver: local
